# Signal Registry — quantamental/config/signals_registry.yaml
#
# This is the single file you edit to add, remove, enable/disable, or
# re-weight signals. No Python changes are needed for enable/disable or
# weight adjustments.
#
# Each signal entry:
#   enabled:     true | false — whether the signal is included in the composite
#   weight:      float        — relative weight within its layer (1.0 = standard)
#   description: string       — human-readable label shown in logs and dashboard
#
# Adding a brand-new signal (beyond enabling/disabling):
#   1. Write a scorer function in signals/ returning int in [-2, +2]
#   2. Add an entry here (enabled: true, weight: ..., description: ...)
#   3. Wire it into the layer's compute_*() function with a registry.is_enabled() guard
#   4. If a new DB column is needed, add it to data/ingest/questdb_writer.py init_schema()
#
# Layer weights control how much each layer contributes to the final
# 3-layer composite (macro dominates; stock signals are noisiest).
# ─────────────────────────────────────────────────────────────────────────────

